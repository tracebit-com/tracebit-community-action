name: Example

on:
  push:

jobs:
  issue-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure credentials
        continue-on-error: true
        uses: tracebit-com/tracebit-community-action@main
        with:
          customer-id: ${{ vars.SECURITY_CUSTOMER_ID }}
          api-token: ${{ secrets.SECURITY_API_TOKEN }}
          profile: administrator
          profile-region: us-east-1
          async: true

      - name: Show env
        if: github.repository != 'tracebit-com/tracebit-community-action'
        run: printenv

      - name: Show aws config
        run: |
          cat ~/.aws/config
          cat ~/.aws/credentials
